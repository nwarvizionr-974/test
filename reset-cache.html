<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Réinitialisation de l’invitation</title>
  <style>body{margin:0;min-height:100vh;display:grid;place-items:center;padding:2rem;background:#f7f3ee;color:#24302b;font-family:Arial,sans-serif;text-align:center}.card{max-width:560px;padding:2.5rem;border-radius:30px;background:#fffdf9;box-shadow:0 20px 60px rgba(36,48,43,.12)}a{color:inherit;font-weight:700}</style>
</head>
<body>
  <main class="card"><h1>Réinitialisation en cours…</h1><p id="status">Suppression des anciens caches.</p></main>
  <script>
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        document.getElementById('status').textContent = 'Réinitialisation terminée. Retour à l’invitation…';
        setTimeout(() => location.replace('./?reset=' + Date.now()), 700);
      } catch (error) {
        document.getElementById('status').innerHTML = 'La réinitialisation automatique a échoué. <a href="./">Revenir à l’invitation</a>.';
      }
    })();
  </script>
</body>
</html>
